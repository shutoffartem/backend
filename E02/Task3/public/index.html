<!DOCTYPE html>
<html>

<head>
    <title>Users</title>
</head>

<body>
    <h1>User API Test</h1>
    <div id="users"></div>

    <script>
        async function loadUsers() {
            const res = await fetch('/api/users')
            const users = await res.json()

            document.getElementById('users').innerHTML =
                users.map(u => `<p>${u.name} - ${u.email}</p>`).join('')
        }

        loadUsers()
    </script>
</body>

</html>
